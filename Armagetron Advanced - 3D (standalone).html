  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

d35eec5-fc84-4119-8ad7-c11303635971\"><\u002Fscript>\n<script src=\"febb4217-561d-4db7-85bc-33446cc0407d\"><\u002Fscript>\n<style>\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  @keyframes ama3dPulse { 0%,100% { opacity:.5; } 50% { opacity:1; } }\n  @keyframes ama3dBoot { 0% { opacity:.35; } 50% { opacity:1; } 100% { opacity:.35; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"--ink:#04060C; --bg:#070A13; --surface:#0C1322; --surface2:#121C30; --raise:#16223A; --line:#21314C; --line2:#2C3F60; --cyan:#1FE3FF; --cyan-deep:#0A8FB0; --text:#DCEAF2; --dim:#9BB0C8; --muted2:#647994; --danger:#FF4D5E; --success:#46E8A0; --warn:#FFC23D; font-family:'Rajdhani',system-ui,sans-serif; background:var(--ink); color:var(--text); min-height:100vh; padding:0 0 120px; background-image:linear-gradient(rgba(31,227,255,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(31,227,255,.035) 1px, transparent 1px); background-size:64px 64px;\">\n\n  <!-- ============ COVER ============ -->\n  <section style=\"position:relative; max-width:1240px; margin:0 auto; padding:96px 48px 64px; overflow:hidden;\">\n    <div style=\"position:absolute; inset:0; background:radial-gradient(120% 90% at 50% -10%, rgba(31,227,255,.16), transparent 60%); pointer-events:none;\"><\u002Fdiv>\n    <div style=\"position:relative; display:flex; align-items:center; gap:14px; font-family:'Share Tech Mono',monospace; font-size:13px; letter-spacing:.34em; color:var(--cyan); text-transform:uppercase;\">\n      <span style=\"width:34px; height:1px; background:var(--cyan); box-shadow:0 0 8px var(--cyan);\"><\u002Fspan>\n      Phase 02 · Companion Brief · 3D Polish Pass\n    <\u002Fdiv>\n    <h1 style=\"position:relative; font-family:'Orbitron',sans-serif; font-weight:800; font-size:70px; line-height:.98; letter-spacing:.02em; margin:26px 0 4px; color:#EAFBFF; text-shadow:0 0 18px rgba(31,227,255,.55), 0 0 54px rgba(31,227,255,.28);\">3D PERSPECTIVE<\u002Fh1>\n    <div style=\"position:relative; display:flex; align-items:baseline; gap:20px; flex-wrap:wrap;\">\n      <h2 style=\"font-family:'Orbitron',sans-serif; font-weight:500; font-size:28px; letter-spacing:.40em; margin:0; color:var(--cyan); text-shadow:0 0 16px rgba(31,227,255,.5);\">VIEWS<\u002Fh2>\n      <span style=\"font-family:'Share Tech Mono',monospace; font-size:12px; letter-spacing:.2em; color:var(--muted2);\">// CHASE + COCKPIT · PROCEDURAL SCENE · ART-REPLACES-PLACEHOLDER<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"position:relative; max-width:680px; margin:30px 0 0; font-size:19px; line-height:1.6; color:var(--dim);\">The camera system and procedural geometry already ship — third-person chase and first-person cockpit, scene built from the wire data. This is the <b style=\"color:var(--text);\">polish pass<\u002Fb>: art that replaces the placeholders so the 3D views look like the C++ client, and better. Everything here is optional and incremental — the client renders fine without any of it. The look stays identical to the 2D foundation: black void, hairline grid, eight signal-bright trails, additive glow.<\u002Fp>\n    <div style=\"position:relative; display:flex; gap:10px; flex-wrap:wrap; margin-top:28px;\">\n      <span style=\"font-family:'Share Tech Mono',monospace; font-size:12px; letter-spacing:.12em; color:var(--cyan); border:1px solid var(--line2); border-radius:3px; padding:7px 13px; background:rgba(31,227,255,.05);\">glTF 2.0 · .glb<\u002Fspan>\n      <span style=\"font-family:'Share Tech Mono',monospace; font-size:12px; letter-spacing:.12em; color:var(--dim); border:1px solid var(--line); border-radius:3px; padding:7px 13px;\">Y-UP · 1u = 1 ARENA UNIT<\u002Fspan>\n      <span style=\"font-family:'Share Tech Mono',monospace; font-size:12px; letter-spacing:.12em; color:var(--dim); border:1px solid var(--line); border-radius:3px; padding:7px 13px;\">≤ 5K TRIS · MOBILE<\u002Fspan>\n      <span style=\"font-family:'Share Tech Mono',monospace; font-size:12px; letter-spacing:.12em; color:var(--dim); border:1px solid var(--line); border-radius:3px; padding:7px 13px;\">WHITE MASTER · 8-COLOR TINT<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SCOPE CARDS ============ -->\n  <section style=\"max-width:1240px; margin:0 auto; padding:0 48px 36px;\">\n    <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:14px;\">\n      <div style=\"border:1px solid var(--line); border-left:2px solid var(--cyan); background:var(--surface); border-radius:4px; padding:18px;\">\n        <div style=\"font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:.18em; color:var(--muted2);\">CARRIES OVER<\u002Fdiv>\n        <div style=\"font-size:20px; font-weight:600; margin:8px 0 4px;\">Palette &amp; glow<\u002Fdiv>\n        <div style=\"font-size:14px; color:var(--dim); line-height:1.45;\">The 8 CVD-checked trail colors and the neon-on-black additive recipe — unchanged.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:1px solid var(--line); border-left:2px solid var(--cyan); background:var(--surface); border-radius:4px; padding:18px;\">\n        <div style=\"font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:.18em; color:var(--muted2);\">CARRIES OVER<\u002Fdiv>\n        <div style=\"font-size:20px; font-weight:600; margin:8px 0 4px;\">HUD in 2D<\u002Fdiv>\n        <div style=\"font-size:14px; color:var(--dim); line-height:1.45;\">Orbitron / Rajdhani / Share Tech Mono drawn flat over the 3D view — identical to 2D mode.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border:1px solid var(--line); border-left:2px solid var(--cyan); background:var(--surface); border-radius:4px; padding:18px;\">\n        <div style=\"font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:.18em; color:var(--muted2);\">NEW WORK<\u002Fdiv>\n        <div style=\"font-size:20px; font-weight:600; margin:8px 0 4px;\">6 art deliverables<\u002Fdiv>\n        <div style=\"font-size:14px; color:var(- u/s²<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; border-bottom:1px solid var(--line); padding-bottom:6px;\"><span style=\"color:var(--muted2);\">Color<\u002Fspan><span style=\"font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--cyan);\">player tint → white<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; justify-content:space-between; border-bottom:1px solid var(--line); padding-bottom:6px;\"><span style=\"color:var(--muted2);\">Blend<\u002Fspan><span style=\"font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--text);\">additive<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:14px; font-family:'Share Tech Mono',monospace; font-size:10.5px; color:var(--muted2); line-height:1.6;\">+ brief grid white-flash on death (carries over from the 2D motion spec). Both pair with a screen-shake ≤ 180ms.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ HANDOFF ============ -->\n  <section style=\"max-width:1240px; margin:0 auto; padding:46px 48px 10px;\">\n    <div style=\"border:1px solid var(--line2); border-radius:10px; background:linear-gradient(180deg, rgba(18,28,48,.5), rgba(12,19,34,.5)); padding:30px 34px;\">\n      <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:18px;\">\n        <h3 style=\"font-family:'Orbitron',sans-serif; font-weight:600; font-size:19px; letter-spacing:.14em; margin:0;\">HAND-OFF &amp; PIPELINE<\u002Fh3>\n        <span style=\"font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--muted2); margin-left:auto;\">Phase 2 · 3D polish<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:28px;\">\n        <div>\n          <div style=\"font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:.16em; color:var(--success); margin-bottom:10px;\">✓ SPEC'D — ART DELIVERABLES<\u002Fdiv>\n          <ul style=\"margin:0; padding-left:18px; font-size:14.5px; color:var(--dim); line-height:1.85;\">\n            <li>Lightcycle model — .glb spec, scale, budget, tint + emissive<\u002Fli>\n            <li>Trail-wall &amp; perimeter-wall textures (tileable, height cue)<\u002Fli>\n            <li>Floor upgrade · skybox · 3D explosion (billboard / particle)<\u002Fli>\n            <li>Camera scale reference for all three modes<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:.16em; color:var(--warn); margin-bottom:10px;\">→ PRODUCTION (to export / lock)<\u002Fdiv>\n          <ul style=\"margin:0; padding-left:18px; font-size:14.5px; color:var(--dim); line-height:1.85;\">\n            <li>Model the .glb to spec → drop into new <span style=\"font-family:'Share Tech Mono',monospace; font-size:12.5px;\">media/models/<\u002Fspan><\u002Fli>\n            <li>Bake textures → <span style=\"font-family:'Share Tech Mono',monospace; font-size:12.5px;\">media/in-game/<\u002Fspan>; update <span style=\"font-family:'Share Tech Mono',monospace; font-size:12.5px;\">PRODUCTION_ASSETS.md<\u002Fspan><\u002Fli>\n            <li>Add a model loader; map keys in <span style=\"font-family:'Share Tech Mono',monospace; font-size:12.5px;\">TextureStore.cs<\u002Fspan><\u002Fli>\n            <li>CVD-verify trail tints hold in perspective + bloom<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"text-align:center; margin-top:26px; font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--muted2); letter-spacing:.2em;\">ARMAGETRON ADVANCED · 3D PERSPECTIVE VIEWS · PHASE 02 · 2026-06-15<\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;localColor&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;P1 Cyan&quot;, &quot;P2 Amber&quot;, &quot;P3 Magenta&quot;, &quot;P4 Lime&quot;, &quot;P5 Azure&quot;, &quot;P6 Red&quot;, &quot;P7 Yellow&quot;, &quot;P8 Violet&quot;], &quot;default&quot;: &quot;P1 Cyan&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;wallHeight&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 9, &quot;min&quot;: 4, &quot;max&quot;: 18, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;showOpponents&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { mode: 'third' };\n\n  // refs\n  stageRef = React.createRef();\n  bootRef = React.createRef();\n  capRef = React.createRef();\n  pillTopRef = React.createRef();\n  pillThirdRef = React.createRef();\n  pillFirstRef = React.createRef();\n\n  PCOLORS = {\n    'P1 Cyan': 0x1FE3FF, 'P2 Amber': 0xFF9A2E, 'P3 Magenta': 0xFF2FA4, 'P4 Lime': 0x8DFF3A,\n    'P5 Azure': 0x3D8BFF, 'P6 Red': 0xFF4D4D, 'P7 Yellow': 0xFFE03A, 'P8 Violet': 0xB968FF\n  };\n  OPP_COLORS = [0xFF9A2E, 0xFF2FA4, 0x8DFF3A, 0xB968FF, 0xFFE03A];\n\n  ARENA = 130;          // half-size\n  CELL = 16;\n  CYCLE_LEN = 7;\n\n  renderVals() {\n    return {\n      stageRef: this.stageRef,\n      bootRef: this.bootRef,\n      capRef: this.capRef,\n      pillTopRef: this.pillTopRef,\n      pillThirdRef: this.pillThirdRef,\n      pillFirstRef: this.pillFirstRef,\n      onTop: () => this.setMode('top'),\n      onThird: () => this.setMode('third'),\n      onFirst: () => this.setMode('first'),\n      onRecenter: () => this.recenter()\n    };\n  }\n\n  componentDidMount() {\n    this._mode = this.state.mode;\n    this._orbitAz = 0; this._orbitEl = 28 * Math.PI / 180; this._orbitDist = 32;\n    this._dragging = false; this._lastX = 0; this._lastY = 0;\n    this._wallH = this.props.wallHeight != null ? this.props.wallHeight : 9;\n    this._showOpp = this.props.showOpponents !== false;\n    this._localColor = this.PCOLORS[this.props.localColor] != null ? this.PCOLORS[this.props.localColor] : 0x1FE3FF;\n    this._tries = 0;\n    this._waitThree();\n    this._onKey = (e) => {\n      const k = e.key.toLowerCase();\n      if (k === 'c') { this._cycleMode(); }\n      else if (k === 'r') { this.recenter(); }\n    };\n    window.addEventListener('keydown', this._onKey);\n  }\n\n  componentWillUnmount() {\n    this._stop = true;\n    window.removeEventListener('keydown', this._onKey);\n    if (this._ro) this._ro.disconnect();\n    if (this._renderer) { this._renderer.dispose(); if (this._renderer.domElement && this._renderer.domElement.parentNode) this._renderer.domElement.parentNode.removeChild(this._renderer.domElement); }\n  }\n\n  componentDidUpdate(prev) {\n    if (!this._scene) return;\n    if (prev.localColor !== this.props.localColor) {\n      this._localColor = this.PCOLORS[this.props.localColor] != null ? this.PCOLORS[this.props.localColor] : 0x1FE3FF;\n      if (this._player) this._player.setColor(this._localColor);\n    }\n    if (prev.wallHeight !== this.props.wallHeight) {\n      this._wallH = this.props.wallHeight != null ? this.props.wallHeight : 9;\n    }\n    if (prev.showOpponents !== this.props.showOpponents) {\n      this._showOpp = this.props.showOpponents !== false;\n      this._cycles.forEach((c, i) => { if (i > 0 && c.group) c.group.visible = this._showOpp; if (i > 0 && c.wall) c.wall.visible = this._showOpp; });\n    }\n  }\n\n  _waitThree() {\n    if (window.THREE && THREE.WebGLRenderer) { this._init(); return; }\n    if (this._tries++ > 200) return;\n    setTimeout(() => this._waitThree(), 60);\n  }\n\n  // ---------- textures ----------\n  _gridTex() {\n    const c = document.createElement('canvas'); c.width = c.height = 256;\n    const g = c.getContext('2d');\n    g.fillStyle = '#05080F'; g.fillRect(0, 0, 256, 256);\n    g.strokeStyle = 'rgba(31,227,255,0.32)'; g.lineWidth = 2;\n    g.strokeRect(0, 0, 256, 256);\n    g.strokeStyle = 'rgba(31,227,255,0.13)'; g.lineWidth = 1;\n    for (let i = 1; i < 4; i++) { const p = i * 64; g.beginPath(); g.moveTo(p, 0); g.lineTo(p, 256); g.moveTo(0, p); g.lineTo(256, p); g.stroke(); }\n    const t = new THREE.CanvasTexture(c);\n    t.wrapS = t.wrapT = THREE.RepeatWrapping;\n    return t;\n  }\n  _wallTex() {\n    const c = document.createElement('canvas'); c.width = 64; c.height = 256;\n    const g = c.getContext('2d');\n    const grd = g.createLinearGradient(0, 256, 0, 0); // bottom->top\n    grd.addColorStop(0, 'rgba(255,255,255,1)');\n    grd.addColorStop(0.45, 'rgba(255,255,255,0.5)');\n    grd.addColorStop(1, 'rgba(255,255,255,0.08)');\n    g.fillStyle = grd; g.fillRect(0, 0, 64, 256);\n    g.strokeStyle = 'rgba(255,255,255,0.30)'; g.lineWidth = 1;\n    for (let i = 1; i < 4; i++) { const p = i * 16; g.beginPath(); g.moveTo(p, 0); g.lineTo(p, 256); g.stroke(); }\n    g.fillStyle = 'rgba(255,255,255,0.9)'; g.fillRect(0, 250, 64, 6); // bright base\n    const t = new THREE.CanvasTexture(c);\n    t.wrapS = THREE.RepeatWrapping; t.wrapT = THREE.ClampToEdgeWrapping;\n    return t;\n  }\n  _perimTex() {\n    const c = document.createElement('canvas'); c.width = 256; c.height = 256;\n    const g = c.getContext('2d');\n    const grd = g.createLinearGradient(0, 0, 0, 256);\n    grd.addColorStop(0, '#0E141F'); grd.addColorStop(0.6, '#090D15'); grd.addColorStop(1, '#05080E');\n    g.fillStyle = grd; g.fillRect(0, 0, 256, 256);\n    g.strokeStyle = 'rgba(0,0,0,0.55)'; g.lineWidth = 2;\n    for (let i = 0; i <= 256; i += 84) { g.beginPath(); g.moveTo(i, 0); g.lineTo(i, 256); g.stroke(); }\n    g.strokeStyle = 'rgba(255,255,255,0.05)'; g.lineWidth = 1;\n    for (let j = 0; j <= 256; j += 34) { g.beginPath(); g.moveTo(0, j); g.lineTo(256, j); g.stroke(); }\n    g.fillStyle = 'rgba(120,140,170,0.30)';\n    for (let i = 10; i < 256; i += 84) for (let j = 10; j < 256; j += 34) { g.beginPath(); g.arc(i, j, 1.4, 0, 6.3); g.fill(); }\n    // decal strip\n    g.fillStyle = 'rgba(4,6,12,0.65)'; g.fillRect(0, 113, 256, 30);\n    g.strokeStyle = 'rgba(31,227,255,0.35)'; g.lineWidth = 1;\n    g.beginPath(); g.moveTo(0, 113); g.lineTo(256, 113); g.moveTo(0, 143); g.lineTo(256, 143); g.stroke();\n    g.fillStyle = 'rgba(31,227,255,0.85)'; g.font = 'bold 13px monospace'; g.textBaseline = 'middle';\n    g.fillText('A R M A G E T R O N', 14, 129);\n    const t = new THREE.CanvasTexture(c);\n    t.wrapS = THREE.RepeatWrapping; t.wrapT = THREE.ClampToEdgeWrapping;\n    return t;\n  }\n  _radialTex() {\n    const c = document.createElement('canvas'); c.width = c.height = 128;\n    const g = c.getContext('2d');\n    const grd = g.createRadialGradient(64, 64, 0, 64, 64, 64);\n    grd.addColorStop(0, 'rgba(31,227,255,0.5)'); grd.addColorStop(0.5, 'rgba(31,227,255,0.12)'); grd.addColorStop(1, 'rgba(31,227,255,0)');\n    g.fillStyle = grd; g.fillRect(0, 0, 128, 128);\n    return new THREE.CanvasTexture(c);\n  }\n\n  // ---------- geometry ----------\n  _dir(yaw) { return { x: Math.cos(yaw), z: -Math.sin(yaw) }; }\n\n  _buildCycle(color) {\n    const grp = new THREE.Group();\n    const edgeMats = []; const coreMats = [];\n    const R = 1.35, wy = R;\n    const hullGeo = new THREE.BoxGeometry(6.2, 1.5, 1.0);\n    const hull = new THREE.Mesh(hullGeo, new THREE.MeshBasicMaterial({ color: 0x070b14 }));\n    hull.position.set(0, wy + 0.9, 0); grp.add(hull);\n    const eMat = new THREE.LineBasicMaterial({ color: color }); edgeMats.push(eMat);\n    const edges = new THREE.LineSegments(new THREE.EdgesGeometry(hullGeo), eMat);\n    edges.position.copy(hull.position); grp.add(edges);\n    // canopy\n    const canGeo = new THREE.BoxGeometry(2.2, 1.0, 0.8);\n    const can = new THREE.Mesh(canGeo, new THREE.MeshBasicMaterial({ color: 0x070b14 }));\n    can.position.set(0.6, wy + 2.1, 0); grp.add(can);\n    const eMat2 = new THREE.LineBasicMaterial({ color: color }); edgeMats.push(eMat2);\n    const ce = new THREE.LineSegments(new THREE.EdgesGeometry(canGeo), eMat2); ce.position.copy(can.position); grp.add(ce);\n    // spine\n    const spineMat = new THREE.MeshBasicMaterial({ color: color }); coreMats.push(spineMat);\n    const spine = new THREE.Mesh(new THREE.BoxGeometry(5.6, 0.18, 0.18), spineMat);\n    spine.position.set(0, wy + 1.7, 0); grp.add(spine);\n    // wheels\n    [2.5, -2.5].forEach((wx, i) => {\n      const wm = new THREE.MeshBasicMaterial({ color: color }); coreMats.push(wm);\n      const w = new THREE.Mesh(new THREE.TorusGeometry(R, 0.16, 8, 22), wm);\n      w.position.set(wx, wy, 0); grp.add(w);\n      const hub = new THREE.Mesh(new THREE.CircleGeometry(R * 0.7, 16), new THREE.MeshBasicMaterial({ color: 0x070b14 }));\n      hub.position.set(wx, wy, 0.001); grp.add(hub);\n      const hub2 = hub.clone(); hub2.position.set(wx, wy, -0.001); hub2.rotation.y = Math.PI; grp.add(hub2);\n    });\n    return {\n      group: grp, edgeMats: edgeMats, coreMats: coreMats,\n      setColor: (col) => { edgeMats.forEach(m => m.color.setHex(col)); coreMats.forEach(m => m.color.setHex(col)); }\n    };\n  }\n\n  _trailPoints(c, maxLen) {\n    const pts = [{ x: c.pos.x, z: c.pos.z }];\n    let acc = 0;\n    for (let i = c.corners.length - 1; i >= 0; i--) {\n      const a = pts[pts.length - 1], b = c.corners[i];\n      const dx = b.x - a.x, dz = b.z - a.z, d = Math.hypot(dx, dz);\n      if (acc + d >= maxLen) { const t = (maxLen - acc) / d; pts.push({ x: a.x + dx * t, z: a.z + dz * t }); break; }\n      acc += d; pts.push({ x: b.x, z: b.z });\n    }\n    return pts.reverse();\n  }\n\n  _wallGeo(pts, h) {\n    const n = pts.length; if (n < 2) return new THREE.BufferGeometry();\n    const pos = []; const uv = []; let run = 0;\n    for (let i = 0; i < n - 1; i++) {\n      const a = pts[i], b = pts[i + 1];\n      const segLen = Math.hypot(b.x - a.x, b.z - a.z);\n      const u0 = run / 6, u1 = (run + segLen) / 6; run += segLen;\n      // two triangles\n      pos.push(a.x, 0, a.z, b.x, 0, b.z, b.x, h, b.z);\n      uv.push(u0, 0, u1, 0, u1, 1);\n      pos.push(a.x, 0, a.z, b.x, h, b.z, a.x, h, a.z);\n      uv.push(u0, 0, u1, 1, u0, 1);\n    }\n    const g = new THREE.BufferGeometry();\n    g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));\n    g.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));\n    return g;\n  }\n\n  _mkCycle(color, pos, yaw, speed, maxLen, isPlayer) {\n    const cyc = this._buildCycle(color);\n    this._scene.add(cyc.group);\n    const wallMat = new THREE.MeshBasicMaterial({ map: this._wtex, color: color, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide });\n    const wall = new THREE.Mesh(new THREE.BufferGeometry(), wallMat);\n    this._scene.add(wall);\n    return {\n      build: cyc, group: cyc.group, setColor: cyc.setColor, wall: wall, wallMat: wallMat,\n      pos: { x: pos.x, z: pos.z }, yaw: yaw, speed: speed, maxLen: maxLen, isPlayer: isPlayer,\n      corners: [{ x: pos.x, z: pos.z }], cool: 0\n    };\n  }\n\n  _stepCycle(c, dt) {\n    const d = this._dir(c.yaw);\n    c.pos.x += d.x * c.speed * dt; c.pos.z += d.z * c.speed * dt;\n    c.cool -= dt;\n    const B = this.ARENA - 8;\n    const look = 16;\n    const ahead = { x: c.pos.x + d.x * look, z: c.pos.z + d.z * look };\n    const hitBound = Math.abs(ahead.x) > B || Math.abs(ahead.z) > B;\n    const wantRandom = c.cool <= 0 && Math.random() < dt * 0.35;\n    if ((hitBound || wantRandom) && c.cool <= 0) {\n      const opts = [c.yaw + Math.PI / 2, c.yaw - Math.PI / 2];\n      let best = opts[0], bestRoom = -1;\n      opts.forEach(y => {\n        const nd = this._dir(y);\n        const fx = c.pos.x + nd.x * look, fz = c.pos.z + nd.z * look;\n        let room = (B - Math.abs(fx)) + (B - Math.abs(fz));\n        if (Math.abs(fx) > B || Math.abs(fz) > B) room -= 1000;\n        room += Math.random() * 4;\n        if (room > bestRoom) { bestRoom = room; best = y; }\n      });\n      c.corners.push({ x: c.pos.x, z: c.pos.z });\n      c.yaw = best; c.cool = 0.45;\n    }\n    // clamp inside hard bound\n    const H = this.ARENA - 3;\n    c.pos.x = Math.max(-H, Math.min(H, c.pos.x));\n    c.pos.z = Math.max(-H, Math.min(H, c.pos.z));\n    // orient + place\n    c.group.position.set(c.pos.x, 0, c.pos.z);\n    c.group.rotation.y = c.yaw;\n    // rebuild wall\n    const pts = this._trailPoints(c, c.maxLen);\n    if (c.wall.geometry) c.wall.geometry.dispose();\n    c.wall.geometry = this._wallGeo(pts, this._wallH);\n    // trim corner history\n    if (c.corners.length > 40) c.corners.splice(0, c.corners.length - 40);\n  }\n\n  _init() {\n    const host = this.stageRef.current; if (!host) return;\n    const W = host.clientWidth || 800, H = host.clientHeight || 360;\n    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));\n    renderer.setSize(W, H); renderer.setClearColor(0x04060c, 1);\n    renderer.domElement.style.display = 'block';\n    host.appendChild(renderer.domElement);\n    this._renderer = renderer;\n\n    const scene = new THREE.Scene();\n    scene.fog = new THREE.FogExp2(0x04060c, 0.0052);\n    this._scene = scene;\n    const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 2000);\n    camera.position.set(0, 60, 80); this._camera = camera;\n    this._lookTarget = new THREE.Vector3(0, 0, 0);\n\n    // floor\n    const gtex = this._gridTex(); gtex.repeat.set(this.ARENA * 2 / this.CELL, this.ARENA * 2 / this.CELL);\n    const floor = new THREE.Mesh(new THREE.PlaneGeometry(this.ARENA * 2, this.ARENA * 2),\n      new THREE.MeshBasicMaterial({ map: gtex }));\n    floor.rotation.x = -Math.PI / 2; scene.add(floor);\n\n    // ground glow pool (follows player)\n    this._glow = new THREE.Mesh(new THREE.PlaneGeometry(95, 95),\n      new THREE.MeshBasicMaterial({ map: this._radialTex(), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));\n    this._glow.rotation.x = -Math.PI / 2; this._glow.position.y = 0.05; scene.add(this._glow);\n\n    // perimeter wall\n    this._wtex = this._wallTex();\n    const ptex = this._perimTex();\n    const pH = this._wallH * 2.6;\n    const A = this.ARENA;\n    const perimPts = [{ x: -A, z: -A }, { x: A, z: -A }, { x: A, z: A }, { x: -A, z: A }, { x: -A, z: -A }];\n    ptex.repeat.set(1, 1);\n    const perimGeo = this._wallGeoPerim(perimPts, pH);\n    const perim = new THREE.Mesh(perimGeo, new THREE.MeshBasicMaterial({ map: ptex, side: THREE.DoubleSide, fog: true }));\n    scene.add(perim);\n    // neon rim on top of perimeter\n    const rimMat = new THREE.LineBasicMaterial({ color: 0x1FE3FF });\n    const rimPos = [];\n    perimPts.forEach(p => rimPos.push(p.x, pH, p.z));\n    const rimGeo = new THREE.BufferGeometry(); rimGeo.setAttribute('position', new THREE.Float32BufferAttribute(rimPos, 3));\n    scene.add(new THREE.Line(rimGeo, rimMat));\n\n    // starfield backdrop\n    const starN = 600, sp = [];\n    for (let i = 0; i < starN; i++) {\n      const r = 600 + Math.random() * 400, th = Math.random() * 6.28, ph = Math.random() * Math.PI * 0.5;\n      sp.push(Math.cos(th) * r * Math.sin(ph) + 0, Math.cos(ph) * r * 0.6 + 40, Math.sin(th) * r * Math.sin(ph));\n    }\n    const sg = new THREE.BufferGeometry(); sg.setAttribute('position', new THREE.Float32BufferAttribute(sp, 3));\n    scene.add(new THREE.Points(sg, new THREE.PointsMaterial({ color: 0x9fd8e6, size: 2.4, sizeAttenuation: false, transparent: true, opacity: 0.7, fog: false })));\n\n    // cycles\n    this._cycles = [];\n    this._player = this._mkCycle(this._localColor, { x: -40, z: 30 }, 0, 42, 150, true);\n    this._cycles.push(this._player);\n    const starts = [{ p: { x: 50, z: -40 }, y: Math.PI }, { p: { x: -30, z: -50 }, y: Math.PI / 2 }, { p: { x: 60, z: 50 }, y: Math.PI }];\n    starts.forEach((s, i) => {\n      const c = this._mkCycle(this.OPP_COLORS[i % this.OPP_COLORS.length], s.p, s.y, 34 + i * 3, 95, false);\n      c.group.visible = this._showOpp; c.wall.visible = this._showOpp;\n      this._cycles.push(c);\n    });\n\n    // bloom (optional)\n    if (THREE.EffectComposer && THREE.RenderPass && THREE.UnrealBloomPass) {\n      try {\n        const composer = new THREE.EffectComposer(renderer);\n        composer.addPass(new THREE.RenderPass(scene, camera));\n        const bloom = new THREE.UnrealBloomPass(new THREE.Vector2(W, H), 0.85, 0.55, 0.05);\n        composer.addPass(bloom);\n        this._composer = composer; this._bloom = bloom;\n      } catch (e) { this._composer = null; }\n    }\n\n    // interaction\n    const el = renderer.domElement;\n    el.addEventListener('pointerdown', (e) => { this._dragging = true; this._lastX = e.clientX; this._lastY = e.clientY; host.style.cursor = 'grabbing'; el.setPointerCapture(e.pointerId); });\n    el.addEventListener('pointermove', (e) => {\n      if (!this._dragging) return;\n      const dx = e.clientX - this._lastX, dy = e.clientY - this._lastY; this._lastX = e.clientX; this._lastY = e.clientY;\n      this._orbitAz -= dx * 0.006;\n      this._orbitEl = Math.max(0.1, Math.min(1.35, this._orbitEl + dy * 0.005));\n    });\n    const endDrag = () => { this._dragging = false; host.style.cursor = 'grab'; };\n    el.addEventListener('pointerup', endDrag); el.addEventListener('pointercancel', endDrag);\n    el.addEventListener('wheel', (e) => { e.preventDefault(); this._orbitDist = Math.max(14, Math.min(75, this._orbitDist * (1 + e.deltaY * 0.0012))); }, { passive: false });\n\n    this._ro = new ResizeObserver(() => this._resize());\n    this._ro.observe(host);\n\n    if (this.bootRef.current) this.bootRef.current.style.display = 'none';\n    this._updatePills(); this._updateCaption();\n    // warm-up: establish trails + settle camera so the first painted frame is rich\n    for (let i = 0; i < 130; i++) {\n      this._cycles.forEach(c => { if (c.isPlayer || this._showOpp) this._stepCycle(c, 0.033); });\n      if (this._glow) this._glow.position.set(this._player.pos.x, 0.05, this._player.pos.z);\n      this._updateCamera(0.033);\n    }\n    if (this._composer) this._composer.render(); else this._renderer.render(this._scene, this._camera);\n    this._clock = new THREE.Clock();\n    this._loop();\n  }\n\n  _wallGeoPerim(pts, h) {\n    const pos = [], uv = []; let run = 0;\n    for (let i = 0; i < pts.length - 1; i++) {\n      const a = pts[i], b = pts[i + 1];\n      const segLen = Math.hypot(b.x - a.x, b.z - a.z);\n      const u0 = run / 26, u1 = (run + segLen) / 26; run += segLen;\n      pos.push(a.x, 0, a.z, b.x, 0, b.z, b.x, h, b.z); uv.push(u0, 0, u1, 0, u1, 1);\n      pos.push(a.x, 0, a.z, b.x, h, b.z, a.x, h, a.z); uv.push(u0, 0, u1, 1, u0, 1);\n    }\n    const g = new THREE.BufferGeometry();\n    g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));\n    g.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));\n    return g;\n  }\n\n  _resize() {\n    const host = this.stageRef.current; if (!host || !this._renderer) return;\n    const W = host.clientWidth, H = host.clientHeight; if (!W || !H) return;\n    this._renderer.setSize(W, H);\n    this._camera.aspect = W / H; this._camera.updateProjectionMatrix();\n    if (this._composer) this._composer.setSize(W, H);\n    if (this._bloom) this._bloom.setSize(W, H);\n  }\n\n  setMode(m) { this._mode = m; this.setState({ mode: m }); this._updatePills(); this._updateCaption(); }\n  _cycleMode() { const order = ['top', 'third', 'first']; const i = order.indexOf(this._mode); this.setMode(order[(i + 1) % 3]); }\n  recenter() { this._orbitAz = 0; this._orbitEl = 28 * Math.PI / 180; this._orbitDist = 32; }\n\n  _updatePills() {\n    const map = [[this.pillTopRef, 'top'], [this.pillThirdRef, 'third'], [this.pillFirstRef, 'first']];\n    map.forEach(([ref, m]) => {\n      const el = ref.current; if (!el) return;\n      if (this._mode === m) { el.style.background = '#1FE3FF'; el.style.color = '#04141A'; el.style.borderColor = '#1FE3FF'; el.style.boxShadow = '0 0 14px rgba(31,227,255,.45)'; }\n      else { el.style.background = 'rgba(7,12,22,.7)'; el.style.color = '#9BB0C8'; el.style.borderColor = '#2C3F60'; el.style.boxShadow = 'none'; }\n    });\n  }\n  _updateCaption() {\n    const el = this.capRef.current; if (!el) return;\n    const txt = { top: 'TOP-DOWN · overhead 2D view', third: 'CHASE · ~32u back · 28° · drag to orbit', first: 'COCKPIT · eye ~3u · along heading' };\n    el.textContent = txt[this._mode] || '';\n  }\n\n  _updateCamera(dt) {\n    const p = this._player; const d = this._dir(p.yaw);\n    const pos = new THREE.Vector3(p.pos.x, 0, p.pos.z);\n    let desired = new THREE.Vector3(); let target = new THREE.Vector3();\n    if (this._mode === 'top') {\n      desired.set(p.pos.x, 150, p.pos.z + 0.01); target.copy(pos);\n    } else if (this._mode === 'first') {\n      const eye = new THREE.Vector3(p.pos.x + d.x * (this.CYCLE_LEN * 0.5 + 1.5), 3, p.pos.z + d.z * (this.CYCLE_LEN * 0.5 + 1.5));\n      desired.copy(eye);\n      target.set(eye.x + d.x * 12, 2.2, eye.z + d.z * 12);\n    } else {\n      const ca = Math.cos(this._orbitAz), sa = Math.sin(this._orbitAz);\n      let bx = -d.x, bz = -d.z;\n      const rx = bx * ca + bz * sa, rz = -bx * sa + bz * ca;\n      const horiz = this._orbitDist * Math.cos(this._orbitEl);\n      const vert = this._orbitDist * Math.sin(this._orbitEl);\n      desired.set(p.pos.x + rx * horiz, 4 + vert, p.pos.z + rz * horiz);\n      target.set(p.pos.x, 4, p.pos.z);\n    }\n    const k = this._mode === 'top' ? 6 : 5;\n    const a = 1 - Math.exp(-dt * k);\n    this._camera.position.lerp(desired, a);\n    this._lookTarget.lerp(target, a);\n    this._camera.lookAt(this._lookTarget);\n  }\n\n  _loop() {\n    if (this._stop) return;\n    requestAnimationFrame(() => this._loop());\n    const dt = Math.min(this._clock.getDelta(), 0.05);\n    this._cycles.forEach(c => { if (c.isPlayer || this._showOpp) this._stepCycle(c, dt); });\n    if (this._glow) this._glow.position.set(this._player.pos.x, 0.05, this._player.pos.z);\n    this._updateCamera(dt);\n    if (this._composer) this._composer.render(); else this._renderer.render(this._scene, this._camera);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
